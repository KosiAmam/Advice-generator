<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Advice generator app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Space+Grotesk:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>

    <main>
      <article class="card">
        <p class="advice-label">ADVICE #<span id="adviceId">117</span></p>

        <blockquote id="adviceText">
          “It is easy to sit up and take notice, what’s difficult is getting up
          and taking action.”
        </blockquote>

        <div class="divider"></div>

        <button class="btn-dice" id="diceButton" aria-label="Generate new advice" type="button">
          <img src="images/icon-dice.svg" alt="" />
        </button>
      </article>
    </main>

    <footer class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener"
          >Frontend Mentor</a
        >. Coded by <a href="#">KosiA</a>.
    </footer>
  </body>
</html>
